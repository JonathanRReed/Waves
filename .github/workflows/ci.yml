name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build, test, and package
    # Needs an Xcode whose SDK actually ships macOS 26 (the Liquid Glass APIs
    # in GlassEffects.swift are gated behind `if #available(macOS 26, *)`, but
    # that's a RUNTIME check — the compiler still must resolve those symbols
    # against its SDK, which macos-14's Xcode lineup (topping out around
    # Xcode 16 / macOS 15 SDK) can't do, regardless of build settings).
    # macos-26 is GA and its Xcode 26.x line has that SDK. This does NOT relax
    # the macOS 14.2 minimum: that's enforced by Package.swift's `platforms`
    # declaration and checked by the compiler on every OS build machine, old
    # or new — the build-machine OS was never what exercised that floor.
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Belt-and-suspenders: pick the newest Xcode actually on the runner
      # rather than trusting the image's default selection, so a future image
      # bump can't silently regress this to an older bundled Xcode again.
      - name: Select latest available Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "::error::No versioned Xcode installation found on this runner; Package.swift requires a Swift 6 toolchain."
            exit 1
          fi
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Build and validate signed app bundle + DMG
        run: ./script/build_and_run.sh --release-check
